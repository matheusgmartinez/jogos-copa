<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <link rel="stylesheet" href="style.css">
    <script></script>
    <title>Jogos da Copa do Mundo 2026</title>
</head>

    </main>
    <script src="script.js"></script>
